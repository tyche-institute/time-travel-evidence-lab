<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="DejaVu Sans, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="400" fill="#ffffff"/>
  <defs>
    <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#A32D2D"/></marker>
    <marker id="aht" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0F6E56"/></marker>
  </defs>
  <text x="40" y="34" font-size="17" font-weight="600" fill="#222222">Same action, two verdicts — judged by when you look</text>

  <line x1="40" y1="362" x2="690" y2="362" stroke="#c3c2b7" stroke-width="1.5"/>
  <text x="40" y="385" font-size="12.5" font-weight="500" fill="#5F5E5A">T₀ — action performed</text>
  <text x="690" y="385" font-size="12.5" font-weight="500" fill="#5F5E5A" text-anchor="end">T₀ + months — reviewed</text>

  <rect x="38" y="158" width="196" height="92" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="56" y="188" font-size="15" font-weight="600" fill="#0F6E56">Action performed</text>
  <text x="56" y="211" font-size="12.5" fill="#085041">a signature, or an agent</text>
  <text x="56" y="233" font-size="13" font-weight="600" fill="#085041">permission: valid ✓</text>
  <line x1="136" y1="250" x2="136" y2="362" stroke="#5DCAA5" stroke-width="1.4" stroke-dasharray="3 3"/>

  <circle cx="360" cy="158" r="34" fill="none" stroke="#888780" stroke-width="2"/>
  <line x1="360" y1="158" x2="360" y2="136" stroke="#5F5E5A" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="360" y1="158" x2="376" y2="166" stroke="#5F5E5A" stroke-width="2.4" stroke-linecap="round"/>
  <text x="360" y="216" font-size="12.5" text-anchor="middle" fill="#5F5E5A">months pass</text>

  <path d="M234 186 C300 186 300 104 470 104" fill="none" stroke="#A32D2D" stroke-width="2" marker-end="url(#ahr)"/>
  <path d="M234 222 C300 222 300 308 470 308" fill="none" stroke="#0F6E56" stroke-width="2" marker-end="url(#aht)"/>

  <rect x="472" y="56" width="214" height="100" rx="12" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.2"/>
  <text x="490" y="84" font-size="14.5" font-weight="600" fill="#791F1F">Ask: is it valid now?</text>
  <text x="490" y="107" font-size="12.5" fill="#791F1F">service since revoked</text>
  <text x="490" y="130" font-size="13" font-weight="600" fill="#791F1F">✗ looks unauthorised</text>
  <text x="579" y="174" font-size="12.5" font-weight="500" text-anchor="middle" fill="#A32D2D">wrong — judged by today</text>

  <rect x="472" y="260" width="214" height="100" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="490" y="288" font-size="14.5" font-weight="600" fill="#0F6E56">Replay the dated record</text>
  <text x="490" y="311" font-size="12.5" fill="#085041">status at action time: valid</text>
  <text x="490" y="334" font-size="13" font-weight="600" fill="#085041">✓ valid when performed</text>
  <path d="M472 338 C300 358 230 308 176 254" fill="none" stroke="#1D9E75" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#aht)"/>
  <text x="348" y="396" font-size="12" text-anchor="middle" font-style="italic" fill="#0F6E56">travel back to action time</text>
</svg>
